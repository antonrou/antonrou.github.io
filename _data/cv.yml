    Industry Experience:
      - company: Microsoft
        position: Software Engineer Intern
        location: Redmond, WA, USA
        start_date: 2026-05
        end_date: present
        highlights:
          - Engineered a production-grade AI agent integrated with Model Context Protocol (MCP) tools for a new internal platform, letting users translate natural language into dynamically generated, debugged, and deployed enterprise agent workflows.
          - Architected the backend to orchestrate model invocation via Azure AI Foundry and persist agent conversation histories in Azure Cosmos DB.
          - Accelerated development cycles by leveraging the GitHub Copilot CLI to manage distributed agent fleets and autonomous subagents.
      - company: Microsoft
        position: Explore (Software Engineering & Product Management) Intern
        location: Redmond, WA, USA
        start_date: 2025-05
        end_date: 2025-08
        highlights:
          - Identified Bing ETL pipeline bottlenecks with PMs and engineers and implemented the optimal architectural approach.
          - Built a full-stack tool (React/TypeScript frontend, Java backend) that cut ETL debugging latency from 15 minutes to seconds using Azure Kubernetes Service, Azure Functions, and Azure SignalR Service.
          - Presented a live demo and quantified impact to stakeholders across Microsoft Bing, including CVPs and VPs.

    Research Experience:
      - company: University of Alberta — RLAI Lab (Dr. Vadim Bulitko)
        position: Undergraduate Researcher
        location: Edmonton, AB, Canada
        start_date: 2025-09
        end_date: 2025-12
        highlights:
          - Developed the first fully specified, open-source reimplementation of the classic Ackley & Littman (1991) predator–prey evolutionary reinforcement learning A-Life testbed.
          - Formulated explainable, differentiable decision lists as a programmatic alternative to black-box neural networks, evaluated across 4,000 independent trials with Kaplan–Meier survival analysis.
          - "Proved programmatic agents significantly outlasted neural networks (log-rank p ~ 4.1e-72), surviving on average 201.69 steps longer (95% CI [180.14, 223.25])."
      - company: University of Alberta — Computational Psychology Lab (Dr. Jeremy Caplan)
        position: Undergraduate Researcher
        location: Edmonton, AB, Canada
        start_date: 2024-05
        end_date: 2024-08
        highlights:
          - Authored a 4000+ word analysis of four computational associative memory models (grade 4.00/4.00) and implemented MATLAB simulations of neural-network, convolution, local-trace, and matrix models.

    Projects:
      - name: Prelude — Microsoft Global Intern Hackathon
        start_date: 2026-07
        end_date: 2026-07
        summary: Co-engineered a framework (team of 6) that automatically generates MCP tools for Microsoft Store apps by crawling the OS accessibility tree; demoed at the global hackathon science fair.
      - name: "[ERL: Evolutionary RL A-Life Testbed](https://github.com/antonrou/erl)"
        date: "2025"
        summary: Open-source reimplementation of the Ackley & Littman (1991) A-Life testbed with programmatic, explainable policies that significantly outlived neural networks.
      - name: MentAI
